name: Upload Models

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Models release tag'
        required: true
        default: 'models-v1'

jobs:
  upload:
    name: Fetch, verify, and upload model assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Create models directory
        run: mkdir -p models voices

      # ── Download models from HuggingFace (one-time trusted fetch) ──

      - name: Download Whisper large-v3-turbo
        run: curl -L --fail -o models/whisper-large-v3-turbo.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin"

      - name: Download Whisper medium
        run: curl -L --fail -o models/ggml-medium.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-medium.bin"

      - name: Download Whisper small
        run: curl -L --fail -o models/ggml-small.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin"

      - name: Download Whisper base
        run: curl -L --fail -o models/ggml-base.bin "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"

      - name: Download LLM (Mistral 7B Q4_K_M)
        run: curl -L --fail -o models/mistral-7b-instruct-q4_k_m.gguf "https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.2-GGUF/resolve/main/mistral-7b-instruct-v0.2.Q4_K_M.gguf"

      - name: Download TTS model (Kokoro 82M)
        run: curl -L --fail -o models/kokoro-v1.0-fp16.onnx "https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/onnx/model_fp16.onnx"

      - name: Download TTS voices
        run: |
          VOICE_BASE="https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/voices"
          VOICES="af_heart af_bella af_sarah af_nicole af_sky af_nova am_adam am_michael am_fenrir bf_alice bf_emma bf_lily bm_daniel bm_george bm_lewis"
          for v in $VOICES; do
            echo "Downloading voice: $v"
            curl -L --fail -o "voices/${v}.bin" "${VOICE_BASE}/${v}.bin"
          done

      # ── Verify SHA-256 checksums for primary models ──

      - name: Verify checksums
        run: |
          echo "Verifying Whisper large-v3-turbo..."
          echo "1fc70f774d38eb169993ac391eea357ef47c88757ef72ee5943879b7e8e2bc69  models/whisper-large-v3-turbo.bin" | sha256sum -c -

          echo "Verifying LLM..."
          echo "3e0039fd0273fcbebb49228943b17831aadd55cbcbf56f0af00499be2040ccf9  models/mistral-7b-instruct-q4_k_m.gguf" | sha256sum -c -

          echo "Verifying TTS model..."
          echo "ba4527a874b42b21e35f468c10d326fdff3c7fc8cac1f85e9eb6c0dfc35c334a  models/kokoro-v1.0-fp16.onnx" | sha256sum -c -

      - name: Compute and display all checksums
        run: |
          echo "=== All model checksums ==="
          sha256sum models/*.bin models/*.gguf models/*.onnx voices/*.bin | tee checksums.txt
          echo "=== Done ==="

      # ── Split the LLM (exceeds GitHub 2 GB per-asset limit) ──

      - name: Split LLM into parts
        run: |
          cd models
          split -b 1500000000 -d -a 1 mistral-7b-instruct-q4_k_m.gguf mistral-7b-instruct-q4_k_m.gguf.part
          ls -lh mistral-7b-instruct-q4_k_m.gguf.part*
          # Remove the original to save disk space
          rm mistral-7b-instruct-q4_k_m.gguf

      # ── Bundle TTS voices ──

      - name: Create voices archive
        run: tar czf models/voices.tar.gz -C voices .

      # ── Generate manifest ──

      - name: Generate manifest.json
        run: |
          python3 -c "
          import json, hashlib, os, glob

          def sha256(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(8192), b''):
                      h.update(chunk)
              return h.hexdigest()

          manifest = {'version': 1, 'models': {}}

          # Single-file models
          singles = {
              'whisper-large-v3-turbo': 'models/whisper-large-v3-turbo.bin',
              'whisper-medium': 'models/ggml-medium.bin',
              'whisper-small': 'models/ggml-small.bin',
              'whisper-base': 'models/ggml-base.bin',
              'tts-model': 'models/kokoro-v1.0-fp16.onnx',
              'voices': 'models/voices.tar.gz',
          }
          for key, path in singles.items():
              manifest['models'][key] = {
                  'filename': os.path.basename(path),
                  'sha256': sha256(path),
                  'sizeBytes': os.path.getsize(path),
                  'parts': None,
              }

          # Multi-part LLM
          parts = sorted(glob.glob('models/mistral-7b-instruct-q4_k_m.gguf.part*'))
          part_list = []
          total_size = 0
          for p in parts:
              size = os.path.getsize(p)
              total_size += size
              part_list.append({
                  'asset': os.path.basename(p),
                  'sha256': sha256(p),
                  'sizeBytes': size,
              })

          # Read the full-file checksum from checksums.txt
          llm_sha256 = ''
          with open('checksums.txt') as f:
              for line in f:
                  if 'mistral-7b-instruct-q4_k_m.gguf' in line and 'part' not in line:
                      llm_sha256 = line.split()[0]

          manifest['models']['llm'] = {
              'filename': 'mistral-7b-instruct-q4_k_m.gguf',
              'sha256': llm_sha256,
              'sizeBytes': total_size,
              'parts': part_list,
          }

          with open('models/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          "

      # ── Create release and upload ──

      - name: Create or update release
        run: |
          gh release create "${{ inputs.release_tag }}" \
            --title "IronMic Models ${{ inputs.release_tag }}" \
            --notes "Model assets for IronMic. Downloaded automatically by the app from Settings > Models. Do not delete — pinned by app releases." \
            --latest=false \
          || echo "Release already exists, uploading assets..."

      - name: Upload assets
        run: |
          gh release upload "${{ inputs.release_tag }}" --clobber \
            models/manifest.json \
            models/whisper-large-v3-turbo.bin \
            models/ggml-medium.bin \
            models/ggml-small.bin \
            models/ggml-base.bin \
            models/mistral-7b-instruct-q4_k_m.gguf.part0 \
            models/mistral-7b-instruct-q4_k_m.gguf.part1 \
            models/mistral-7b-instruct-q4_k_m.gguf.part2 \
            models/kokoro-v1.0-fp16.onnx \
            models/voices.tar.gz
