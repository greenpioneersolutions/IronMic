name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            cargo-features: '--features metal,tts'
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            cargo-features: '--features tts'
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            cargo-features: '--features tts'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build Rust addon
        working-directory: rust-core
        run: cargo build --release ${{ matrix.cargo-features }}

      - name: Copy Rust addon as .node file
        shell: bash
        working-directory: rust-core
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cp target/release/libironmic_core.dylib ironmic-core.node
          elif [ "$RUNNER_OS" = "Linux" ]; then
            cp target/release/libironmic_core.so ironmic-core.node
          elif [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/ironmic_core.dll ironmic-core.node
          fi
          ls -lh ironmic-core.node

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: electron-app
        run: npm ci

      - name: Download bundled TTS voices
        shell: bash
        run: |
          mkdir -p rust-core/models/voices
          VOICE_BASE="https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/voices"
          for v in af_heart af_bella af_sarah af_nicole af_sky af_nova am_adam am_michael am_fenrir bf_alice bf_emma bf_lily bm_daniel bm_george bm_lewis; do
            curl -L --fail -o "rust-core/models/voices/${v}.bin" "${VOICE_BASE}/${v}.bin"
          done

      - name: Build frontend
        working-directory: electron-app
        run: npm run build

      - name: Package
        working-directory: electron-app
        run: npx electron-builder --config electron-builder.config.js --publish never

      # Only upload the actual installers — not blockmaps, debug files, or unpacked dirs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ironmic-${{ matrix.os }}
          path: |
            electron-app/release/*.dmg
            electron-app/release/*.exe
            electron-app/release/*.AppImage
            electron-app/release/*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## IronMic ${{ github.ref_name }}

            Fully-local voice transcription and text-to-speech. All processing on-device — no cloud, no telemetry, no accounts.

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe` installer |
            | Linux | `.AppImage` / `.deb` |

            ### First Launch

            1. Install and open IronMic
            2. Go to **Settings > Models**
            3. Download the **Whisper** speech recognition model (~1.5 GB)
            4. Press **Cmd+Shift+V** (or Ctrl+Shift+V) to start dictating

            TTS voices are bundled in the installer — read-back works immediately. Models are hosted on GitHub Releases with SHA-256 integrity verification.

            See [CHANGELOG.md](CHANGELOG.md) for the full list of changes.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
