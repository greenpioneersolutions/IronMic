name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build Rust addon
        working-directory: rust-core
        run: cargo build --release

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build frontend
        working-directory: electron-app
        run: npx vite build

      - name: Package
        working-directory: electron-app
        run: npx electron-builder --config electron-builder.config.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ironmic-${{ matrix.os }}
          path: electron-app/release/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## IronMic ${{ github.ref_name }}

            Fully-local voice transcription and text-to-speech. All processing on-device — no cloud, no telemetry, no accounts.

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe` installer |
            | Linux | `.AppImage` |

            ### First Launch

            1. Install and open IronMic
            2. Go to **Settings > Models**
            3. Download the **Whisper** speech recognition model (~1.5 GB)
            4. Press **Cmd+Shift+V** (or Ctrl+Shift+V) to start dictating

            See [CHANGELOG.md](CHANGELOG.md) for the full list of changes.
          files: |
            artifacts/**/*
