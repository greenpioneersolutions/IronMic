name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            cargo-features: '--features metal,tts,engine-multi,forge'
          - os: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            cargo-features: '--features whisper,tts,engine-multi,forge'
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            cargo-features: '--features whisper,tts,engine-multi,forge'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Audio (cpal/ALSA) + X11 display (uiohook-napi keyboard hook)
          # uiohook-napi compiles libuiohook from source via node-gyp.
          # Its binding.gyp for Linux defines USE_XRANDR, USE_EVDEV, USE_XT
          # and links: -lX11 -lXrandr -lXtst -lXt -lpthread
          #
          #   libx11-dev    — Xlib / X11/*.h headers (-lX11)
          #   libxtst-dev   — XTest + record extensions (-lXtst)
          #   libxrandr-dev — RandR extension headers (-lXrandr)
          #   libxt-dev     — X Toolkit Intrinsics / X11/Intrinsic.h (-lXt)
          #                   USE_XT is always defined on Linux; without this
          #                   package the build fails:
          #                   "fatal error: X11/Intrinsic.h: No such file"
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxtst-dev \
            libxrandr-dev \
            libxt-dev

      - name: Build Rust addon
        shell: bash
        working-directory: rust-core
        run: |
          cargo build --release --features napi-export ${{ matrix.cargo-features }}
          echo "--- Copying native addon to ironmic-core.node ---"
          if [ "$RUNNER_OS" = "macOS" ]; then
            cp target/release/libironmic_core.dylib ironmic-core.node
          elif [ "$RUNNER_OS" = "Linux" ]; then
            cp target/release/libironmic_core.so ironmic-core.node
          elif [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/ironmic_core.dll ironmic-core.node
          fi
          ls -lh ironmic-core.node

      - name: Build LLM binary
        shell: bash
        working-directory: rust-core
        run: cargo build --release --bin ironmic-llm --features llm-bin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: electron-app
        run: npm ci

      - name: Download bundled TTS voices
        shell: bash
        run: |
          mkdir -p rust-core/models/voices
          VOICE_BASE="https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/voices"
          for v in af_heart af_bella af_sarah af_nicole af_sky af_nova am_adam am_michael am_fenrir bf_alice bf_emma bf_lily bm_daniel bm_george bm_lewis; do
            curl -L --fail -o "rust-core/models/voices/${v}.bin" "${VOICE_BASE}/${v}.bin"
          done

      - name: Download bundled Moonshine Base
        shell: bash
        run: |
          mkdir -p rust-core/models/moonshine-base
          BASE="https://huggingface.co/UsefulSensors/moonshine/resolve/main/onnx/merged/base/float"
          for f in encoder_model.onnx decoder_model_merged.onnx tokenizer.json; do
            curl -L --fail -o "rust-core/models/moonshine-base/$f" "$BASE/$f"
          done

      - name: Download bundled Phi-3 Mini Q2_K
        shell: bash
        run: |
          PARTIAL="rust-core/models/Phi-3-mini-4k-instruct-Q2_K.gguf.partial"
          DEST="rust-core/models/Phi-3-mini-4k-instruct-Q2_K.gguf"
          curl -L --fail -o "$PARTIAL" \
            "https://huggingface.co/bartowski/Phi-3-mini-4k-instruct-GGUF/resolve/main/Phi-3-mini-4k-instruct-Q2_K.gguf" \
            || { rm -f "$PARTIAL"; echo "Phi-3 download failed"; exit 1; }
          mv "$PARTIAL" "$DEST"

      - name: Build frontend
        working-directory: electron-app
        run: npm run build

      - name: Verify all artifacts before packaging
        shell: bash
        run: |
          echo "=== Verifying build artifacts ==="
          ls -lh rust-core/ironmic-core.node || { echo "FATAL: ironmic-core.node missing!"; exit 1; }
          LLM_BIN="rust-core/target/release/ironmic-llm"
          [ "$RUNNER_OS" = "Windows" ] && LLM_BIN="${LLM_BIN}.exe"
          ls -lh "$LLM_BIN" || { echo "FATAL: ironmic-llm binary missing!"; exit 1; }
          ls rust-core/models/voices/*.bin | wc -l | xargs -I{} echo "TTS voices: {} files"
          test -f rust-core/models/voices/af_heart.bin || { echo "FATAL: TTS voices missing!"; exit 1; }
          test -s rust-core/models/moonshine-base/encoder_model.onnx || { echo "FATAL: Moonshine encoder missing!"; exit 1; }
          test -s rust-core/models/moonshine-base/decoder_model_merged.onnx || { echo "FATAL: Moonshine decoder missing!"; exit 1; }
          test -s rust-core/models/moonshine-base/tokenizer.json || { echo "FATAL: Moonshine tokenizer missing!"; exit 1; }
          phi3_bytes=$(wc -c < rust-core/models/Phi-3-mini-4k-instruct-Q2_K.gguf | tr -d ' ')
          [ "$phi3_bytes" -ge 1200000000 ] || { echo "FATAL: Phi-3 truncated ($phi3_bytes bytes)!"; exit 1; }
          echo "=== All artifacts present (Phi-3: $phi3_bytes bytes) ==="

      - name: Package
        working-directory: electron-app
        run: npx electron-builder --config electron-builder.config.js --publish never

      - name: Check installer size fits GitHub 2 GiB limit
        shell: bash
        run: |
          for f in electron-app/release/*.dmg electron-app/release/*.exe \
                   electron-app/release/*.AppImage electron-app/release/*.deb; do
            [ -f "$f" ] || continue
            size=$(wc -c < "$f" | tr -d ' ')
            echo "  $f: $size bytes"
            [ "$size" -lt 2147483648 ] || { echo "FATAL: $f exceeds GitHub 2 GiB limit!"; exit 1; }
          done

      # Only upload the actual installers — not blockmaps, debug files, or unpacked dirs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ironmic-${{ matrix.os }}
          path: |
            electron-app/release/*.dmg
            electron-app/release/*.exe
            electron-app/release/*.AppImage
            electron-app/release/*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## IronMic ${{ github.ref_name }}

            Fully-local voice transcription and text-to-speech. All processing on-device — no cloud, no telemetry, no accounts.

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` |
            | Windows | `.exe` installer |
            | Linux | `.AppImage` / `.deb` |

            ### First Launch

            1. Install and open IronMic
            2. Go to **Settings > Models**
            3. Download the **Whisper** speech recognition model (~1.5 GB)
            4. Press **Cmd+Shift+V** (or Ctrl+Shift+V) to start dictating

            TTS voices are bundled in the installer — read-back works immediately. Models are hosted on GitHub Releases with SHA-256 integrity verification.

            See [CHANGELOG.md](CHANGELOG.md) for the full list of changes.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
