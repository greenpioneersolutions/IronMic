<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: mediastream:; connect-src 'self' blob:;" />
    <title>IronMic</title>
  </head>
  <body>
    <script>
      // Apply theme before first paint to avoid flash
      try {
        const s = localStorage.getItem('ironmic-theme');
        const theme = s || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch {}
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
